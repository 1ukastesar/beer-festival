<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pivní slavnosti – Žebříček</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600&display=swap');
  :root{
    --amber:#e8a93a;--amber-deep:#b9770e;--foam:#fdf6e3;--dark:#2b1d0e;
    --gold:#f1c40f;--green:#5d8a4a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{height:100%;}
  /* dvh = dynamic viewport height -> based on the real window (including
     browser bars), not the fullscreen height. */
  body{
    height:100vh;height:100dvh;overflow:hidden;
    font-family:'Fraunces',Georgia,serif;
    background:radial-gradient(ellipse at 30% 20%,#3a2810 0%,#1c1308 70%,#0f0a04 100%);
    color:var(--foam);display:flex;flex-direction:column;padding:2vh 2.5vw;
  }
  h1{font-family:'Alfa Slab One',cursive;font-size:3.6vw;text-align:center;color:var(--gold);
    text-shadow:0 3px 0 var(--amber-deep),0 6px 18px rgba(0,0,0,.6);margin-bottom:.1em;letter-spacing:1px;}
  .sub{text-align:center;font-style:italic;font-size:1.2vw;opacity:.65;margin-bottom:1.5vh;}
  /* board is a grid; the column count is set in JS from the beer count.
     min-height:0 lets the board shrink in the flex column and overflow:hidden
     ensures the rows never spill over the header/footer, so the bottom
     navigation stays visible even in a small window. */
  .board{flex:1;min-height:0;overflow:hidden;display:grid;gap:.8vh 1.5vw;align-content:center;grid-auto-flow:column;}
  .row{
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:.8vw;
    background:rgba(253,246,227,.06);border:1.5px solid rgba(253,246,227,.13);
    border-radius:12px;padding:.3em 1.2vw;overflow:hidden;transition:all .5s cubic-bezier(.2,.8,.2,1);
  }
  .row.top{background:linear-gradient(90deg,rgba(241,196,15,.20),rgba(241,196,15,.04));
    border-color:var(--gold);box-shadow:0 0 24px rgba(241,196,15,.2);}
  .rank{font-family:'Alfa Slab One',cursive;text-align:center;color:var(--amber);min-width:1.6em;}
  .row.top .rank{color:var(--gold);}
  .name{font-family:'Alfa Slab One',cursive;color:var(--foam);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.15;}
  .barwrap{height:.28em;background:rgba(0,0,0,.35);border-radius:20px;overflow:hidden;margin-top:.28em;}
  .bar{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:20px;transition:width .8s ease;}
  .score{text-align:right;font-family:'Alfa Slab One',cursive;color:var(--foam);}
  .cnt{font-size:.65em;opacity:.55;font-style:italic;font-family:'Fraunces',serif;font-weight:400;}
  .empty{text-align:center;font-size:1.6vw;opacity:.5;font-style:italic;margin-top:6vh;}
  .foot{text-align:center;font-size:1vw;opacity:.4;font-style:italic;margin-top:1vh;}
  .info{min-width:0;}
  /* page indicator (only when the beers are paginated) */
  .pageind{display:flex;justify-content:center;align-items:center;gap:1vw;height:1.6vh;margin-top:.6vh;}
  .pageind .dot{width:1.1vh;height:1.1vh;border-radius:50%;background:rgba(253,246,227,.22);transition:all .4s;cursor:pointer;}
  .pageind .dot:hover{background:rgba(253,246,227,.5);}
  .pageind .dot.on{background:var(--gold);box-shadow:0 0 10px rgba(241,196,15,.6);transform:scale(1.2);}
</style>
</head>
<body>
  <h1>🍺 Žebříček piv 🍺</h1>
  <div class="sub">Jak si podle Vás vedou jednotlivá piva</div>
  <div class="board" id="board"></div>
  <div class="pageind" id="pageind"></div>
  <div class="foot">Hlasuj na sk-sivice.cz • Aktualizace za <span id="refreshCounter">10</span>s</div>

<script>
const medals=['🥇','🥈','🥉'];

// --- pagination config ---
const PER_PAGE  = 6;      // more beers than this -> the ranking splits into pages
const PAGE_MS   = 12000;   // how often a page switches automatically (ms)

let data=[];               // last sorted data from the server
let page=0;                // current page (0-based)
let lastTop=null;
let pageTimer=null;

function pageCount(){ return Math.max(1, Math.ceil(data.length/PER_PAGE)); }

// Lays out the rows for n beers on a page in a single column, so even long
// beer names get the full width. The row font size scales to the ACTUAL
// available board height (not just width), so everything fits even in a
// window that is not fullscreen.
function layout(n){
  const cols = 1;
  const perCol = n;
  const board=document.getElementById('board');
  board.style.gridTemplateColumns = '1fr';
  // minmax(0,1fr) -> tracks may shrink below their content, so the rows never
  // grow past the board (and over the header/footer).
  board.style.gridTemplateRows = 'repeat('+perCol+',minmax(0,1fr))';
  // Font derived from the ACTUAL height per row (after subtracting the gaps).
  // A row takes about 2.6x the font size (name + bar + padding), capped by
  // width so nothing overflows on a wide, short window.
  const gap = window.innerHeight * 0.008;              // ~ .8vh row-gap
  const avail = board.clientHeight;                    // px available for rows
  const perRow = avail > 0 ? (avail - gap*(perCol-1)) / perCol : Infinity;
  const byH = perRow / 2.6;
  const byW = window.innerWidth * 0.026;               // cap ~2.6vw
  const fs = Math.max(10, Math.min(byW, byH));          // px
  document.documentElement.style.setProperty('--rowfs', fs + 'px');
  return {cols,perCol};
}

function hlasu(n){if(n===1)return 'hlas';if(n>=2&&n<=4)return 'hlasy';return 'hlasů';}

// Renders the page indicator dots (hidden when there is only one page).
// Clicking a dot switches to that page (manual -> resets the timer).
function renderDots(){
  const ind=document.getElementById('pageind');
  const pc=pageCount();
  if(pc<=1){ ind.innerHTML=''; return; }
  let html='';
  for(let i=0;i<pc;i++) html+='<div class="dot'+(i===page?' on':'')+'" data-i="'+i+'"></div>';
  ind.innerHTML=html;
  ind.querySelectorAll('.dot').forEach(d=>{
    d.addEventListener('click',()=>goToPage(Number(d.dataset.i),true));
  });
}

// Renders the current page. The rank is global across pages, so the second
// page continues with 13, 14, and so on.
function drawPage(){
  const board=document.getElementById('board');
  if(data.every(d=>d.count===0)){
    board.style.display='block';
    board.innerHTML='<div class="empty">Zatím žádné hlasy — buď první! 🍺</div>';
    document.getElementById('pageind').innerHTML='';
    return;
  }
  const start=page*PER_PAGE;
  const slice=data.slice(start,start+PER_PAGE);
  board.style.display='grid';
  layout(slice.length);
  board.innerHTML='';
  slice.forEach((d,i)=>{
    const gi=start+i;                       // global index (rank)
    const row=document.createElement('div');
    row.className='row'+(gi===0&&d.count>0?' top':'');
    const rank=(gi<3&&d.count>0)?medals[gi]:(gi+1);
    const pct=d.count>0?(d.avg/10*100):0;
    const avg=d.count>0?d.avg.toFixed(1):'–';
    row.style.fontSize='var(--rowfs)';
    row.innerHTML=
      '<div class="rank">'+rank+'</div>'+
      '<div class="info"><div class="name">'+d.beer+'</div>'+
        '<div class="barwrap"><div class="bar" style="width:'+pct+'%"></div></div></div>'+
      '<div class="score">'+avg+'<div class="cnt">'+d.count+' '+hlasu(d.count)+'</div></div>';
    board.appendChild(row);
  });
  renderDots();
}

function stopRotation(){ if(pageTimer){ clearInterval(pageTimer); pageTimer=null; } }
function startRotation(){
  stopRotation();
  if(pageCount()>1) pageTimer=setInterval(()=>goToPage(page+1,false), PAGE_MS);
}

// Switches to page p (wraps both ways). manual=true -> resets the countdown,
// so after a manual switch the user gets the full interval before the page
// advances on its own.
function goToPage(p, manual){
  const pc=pageCount();
  if(pc<=1){ page=0; drawPage(); return; }
  page=((p%pc)+pc)%pc;
  drawPage();
  if(manual) startRotation();
}

// Starts/stops automatic page switching based on the page count.
// Leaves a running timer alone so the cadence is not reset after polling.
function syncRotation(){
  if(pageCount()>1){ if(!pageTimer) startRotation(); }
  else stopRotation();
}

function render(fresh){
  fresh.sort((a,b)=>b.avg-a.avg);
  data=fresh;
  if(page>=pageCount()) page=0;      // if beers were removed, do not run past the range
  drawPage();
  syncRotation();
  const board=document.getElementById('board');
  const top=data[0]&&data[0].count>0?data[0].beer:null;
  if(top&&top!==lastTop&&lastTop!==null&&page===0&&board.firstChild){ board.firstChild.classList.add('pulse'); }
  lastTop=top;
}

// Polling: we ask the server for results (serverless cannot do SSE).
async function poll(){
  try{
    const res = await fetch('/api/results', {cache:'no-store'});
    if(res.ok) render(await res.json());
  }catch(err){ console.error(err); }
}

// Refresh every POLL_S seconds, driven by a 1 s countdown so the footer can
// show "Aktualizace za <X>s". When the countdown hits 0 we poll and reset it.
const POLL_S = 10;
let countdown = POLL_S;
function showCountdown(){
  const el = document.getElementById('refreshCounter');
  if(el) el.textContent = countdown;
}
poll();
showCountdown();
setInterval(()=>{
  countdown--;
  if(countdown <= 0){ poll(); countdown = POLL_S; }
  showCountdown();
}, 1000);

// The font is now in px based on height -> redraw after a window resize.
window.addEventListener('resize', ()=>{ if(data.length) drawPage(); });

// Manual paging with the keyboard arrows (left/right and up/down). Manual -> resets the timer.
document.addEventListener('keydown', e=>{
  if(pageCount()<=1) return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){ goToPage(page+1,true); e.preventDefault(); }
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){ goToPage(page-1,true); e.preventDefault(); }
});
</script>
<!-- Vercel Speed Insights - needs Speed Insights enabled in the project's Observability tab -->
<script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
